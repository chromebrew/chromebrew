---
# Version 2.1
name: Unit Tests
on:
  check_run:
    types:
      - created
  merge_group:
  pull_request:
    types:
      - opened
      - ready_for_review
      - reopened
      - synchronize
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch of chromebrew/chromebrew to run on, if different from this branch."
        required: false
  workflow_run:
    workflows: [Generate PR]
    types:
      - completed
env:
  BRANCH: ${{ inputs.branch || github.event.workflow_run.head_branch || github.head_ref || github.ref_name }}
jobs:
  debug:
    runs-on: ubuntu-24.04
    steps:
      - name: Dump GitHub context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "$GITHUB_CONTEXT"
      - name: Dump job context
        env:
          JOB_CONTEXT: ${{ toJson(job) }}
        run: echo "$JOB_CONTEXT"
      - name: Dump steps context
        env:
          STEPS_CONTEXT: ${{ toJson(steps) }}
        run: echo "$STEPS_CONTEXT"
  setup:
    runs-on: ubuntu-24.04
    concurrency:
      group: ${{ github.workflow }}-${{ inputs.branch || github.event.workflow_run.head_branch || github.head_ref || github.ref_name }}-${{ github.sha }}
      cancel-in-progress: true
    outputs:
      current_head: ${{ steps.get-current-head.outputs.CURRENT_HEAD }}
      changed_packages: ${{ steps.changed-packages.outputs.CHANGED_PACKAGES }}
      non-package-non-workflow-non-manifest_files: ${{ steps.changed-files.outputs.non-package-non-workflow-non-manifest_all_changed_files }}
      changed_workflow_files: ${{ steps.changed-files.outputs.workflows_all_changed_files }}
    steps:
      - name: Dump Concurrency Group
        env:
          CONCURRENCY_GROUP: ${{ github.workflow }}-${{ inputs.branch || github.event.workflow_run.head_branch || github.head_ref || github.ref_name }}-${{ github.sha }}
        run: |
          echo "Concurrency Group: ${CONCURRENCY_GROUP}"
      - name: Get GH Token
        if: github.event.pull_request.head.repo.full_name == 'chromebrew/chromebrew'
        id: get_workflow_token
        uses: peter-murray/workflow-application-token-action@v5
        with:
          application_id: ${{ secrets.APPLICATION_ID }}
          application_private_key: ${{ secrets.APPLICATION_PRIVATE_KEY }}
          organization: chromebrew
          revoke_token: true
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: true
          repository: ${{ github.event.pull_request.head.repo.full_name || github.event.repository.full_name }}
          ref: ${{ inputs.branch || github.event.workflow_run.head_branch || github.head_ref || github.ref_name }}
      - name: Remove Reviewers
        env:
          GH_TOKEN: ${{ steps.get_workflow_token.outputs.token || secrets.CREW_PR_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          echo "Removing chromebew/active from requested reviewers while Unit Tests are run on ${BRANCH}."
          gh pr edit ${BRANCH} --remove-reviewer chromebrew/active || true
      - name: Get Current HEAD hash
        id: get-current-head
        run: |
          echo "CURRENT_HEAD=$(git ls-remote https://github.com/${{ github.repository }}.git | head -1 | sed 's/HEAD//')" >> "$GITHUB_OUTPUT"
          echo "CURRENT_HEAD is $(git ls-remote https://github.com/${{ github.repository }}.git | head -1 | sed 's/HEAD//')"
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          base_sha: ${{ steps.get-current-head.outputs.CURRENT_HEAD }}
          since_last_remote_commit: true
          files_yaml: |
            non-package-non-workflow-non-manifest:
              - '**'
              - '!.github/workflows/*.yml'
              - '!packages/**.rb'
              - '!manifest/**'
            packages:
              - packages/**.rb
            workflows:
              - '.github/workflows/*.yml'
      - name: Sanitize and export changed packages to github context.
        id: changed-packages
        run: |
            if [[ -z "${{ steps.changed-files.outputs.packages_all_changed_files }}" ]]; then
              echo "Branch ${BRANCH} has no changed package files."
            fi
            # Convert "packages/foo.rb packages/bar.rb" (from steps.changed-files.outputs.packages_all_changed_files) into "foo bar"
            echo "CHANGED_PACKAGES=$(echo "${{ steps.changed-files.outputs.packages_all_changed_files }}" | xargs --no-run-if-empty basename -s .rb | xargs --no-run-if-empty)" >> "$GITHUB_ENV"
            echo "CHANGED_PACKAGES=$(echo "${{ steps.changed-files.outputs.packages_all_changed_files }}" | xargs --no-run-if-empty basename -s .rb | xargs --no-run-if-empty)" >> "$GITHUB_OUTPUT"
      - name: Check Setup Outputs
        env:
          STEPS_CHANGED_PACKAGES_EMPTY: ${{ steps.changed-packages.outputs.CHANGED_PACKAGES != '' }}
          STEPS_NON_PKG_NON_WORKFLOW_CHANGED_FILES_EMPTY: ${{ steps.changed-files.outputs.non-package-non-workflow-non-manifest_all_changed_files != '' }}
          NON_PKG_NON_WORKFLOW_CHANGED_FILES: ${{ steps.changed-files.outputs.non-package-non-workflow-non-manifest_all_changed_files }}
        run: |
          echo "steps.changed-packages.outputs.CHANGED_PACKAGES != '' : ${STEPS_CHANGED_PACKAGES_EMPTY}"
          echo "steps.changed-files.outputs.non-package-non-workflow-non-manifest_all_changed_files != '' : ${STEPS_NON_PKG_NON_WORKFLOW_CHANGED_FILES_EMPTY}"
          [[ -n ${NON_PKG_NON_WORKFLOW_CHANGED_FILES} ]] && echo "NON_PKG_NON_WORKFLOW_CHANGED_FILES: ${NON_PKG_NON_WORKFLOW_CHANGED_FILES}" || true
  get-compatibility:
    needs: setup
    if: ${{ ( needs.setup.outputs.changed_packages != '' ) || ( needs.setup.outputs.non-package-non-workflow-non-manifest_files != '' ) }}
    uses: ./.github/workflows/Determine-Compatibility.yml
    with:
      changed_packages: ${{ needs.setup.outputs.changed_packages }}

  gen-matrix:
    needs: get-compatibility
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-generate-matrix.outputs.matrix }}
    steps:
      - name: Generate Creation Matrix
        id: set-generate-matrix
        env:
          i686_PACKAGES: ${{ needs.get-compatibility.outputs.i686_PACKAGES }}
          x86_64_PACKAGES: ${{ needs.get-compatibility.outputs.x86_64_PACKAGES }}
          armv7l_PACKAGES: ${{ needs.get-compatibility.outputs.armv7l_PACKAGES }}
        run: |
          function join_by { local IFS="$1"; shift; echo "$*"; }
          [[ -n "${i686_PACKAGES}" ]] && export CONTAINER_ARCH+=( "\"i686\"" )
          # Always run on x86_64
          export CONTAINER_ARCH+=( "\"x86_64\"" )
          [[ -n "${armv7l_PACKAGES}" ]] && export CONTAINER_ARCH+=( "\"armv7l\"" )
          export ARCHES="$(join_by , "${CONTAINER_ARCH[@]}")"
          echo "matrix=[${ARCHES}]" >> $GITHUB_OUTPUT
          echo "matrix=[${ARCHES}]"

  container_tests:
    needs:
      - setup
      - gen-matrix
      - get-compatibility
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJSON(needs.gen-matrix.outputs.matrix) }}
        runner:
          - ubuntu-24.04
          - ubuntu-24.04-arm
        exclude:
          - arch: x86_64
            runner: ubuntu-24.04-arm
          - arch: i686
            runner: ubuntu-24.04-arm
          - arch: armv7l
            runner: ubuntu-24.04
    runs-on: ${{ matrix.runner }}
    concurrency:
      group: ${{ matrix.arch }}-${{ github.workflow }}-${{ inputs.branch || github.event.workflow_run.head_branch || github.head_ref || github.ref_name }}-${{ github.sha }}
      cancel-in-progress: true
    steps:
      - name: Dump Concurrency Group
        env:
          CONCURRENCY_GROUP: $${{ matrix.arch }}-{{ github.workflow }}-${{ inputs.branch || github.event.workflow_run.head_branch || github.head_ref || github.ref_name }}-${{ github.sha }}
        run: |
          echo "Concurrency Group: ${CONCURRENCY_GROUP}"
      - uses: actions/checkout@v7
        with:
          persist-credentials: true
          repository: ${{ github.event.pull_request.head.repo.full_name || github.event.repository.full_name }}
          ref: ${{ inputs.branch || github.event.workflow_run.head_branch || github.head_ref || github.ref_name }}
      - name: Dump GitHub context
        env:
          GITHUB_CONTEXT: ${{ toJson(github) }}
        run: echo "$GITHUB_CONTEXT"
      - name: Dump job context
        env:
          JOB_CONTEXT: ${{ toJson(job) }}
        run: echo "$JOB_CONTEXT"
      - name: Dump steps context
        env:
          STEPS_CONTEXT: ${{ toJson(steps) }}
        run: echo "$STEPS_CONTEXT"
      - name: Dump runner context
        env:
          RUNNER_CONTEXT: ${{ toJson(runner) }}
        run: echo "$RUNNER_CONTEXT"
      - name: Dump strategy context
        env:
          STRATEGY_CONTEXT: ${{ toJson(strategy) }}
        run: echo "$STRATEGY_CONTEXT"
      - name: Dump matrix context
        env:
          MATRIX_CONTEXT: ${{ toJson(matrix) }}
        run: echo "$MATRIX_CONTEXT"
      - name: Export target docker container environment to github context
        run: |
            case ${{ matrix.arch }} in
              x86_64)
                # Export the x86_64 container depending on whether this branch updates packages with appropriate minimum glibc.
                if [[ -n "${{ needs.get-compatibility.outputs.glibc_232_compat }}" ]]; then
                    echo "CONTAINER=satmandu/crewbuild:nocturne-x86_64.m97" >> "$GITHUB_ENV"
                elif [[ -n "${{ needs.get-compatibility.outputs.glibc_237_compat }}" ]]; then
                    echo "CONTAINER=satmandu/crewbuild:hatch-x86_64.m149" >> "$GITHUB_ENV"
                else
                    echo "CONTAINER=satmandu/crew-pre-glibc-standalone:nocturne-x86_64.m90" >> "$GITHUB_ENV"
                fi
                echo "PLATFORM=linux/amd64" >> "$GITHUB_ENV"
                echo "LIB_SUFFIX=64" >> "$GITHUB_ENV"
                if [[ -n "${{ needs.get-compatibility.outputs.x86_64_packages }}" ]]; then
                    echo "CHANGED_PACKAGES=${{ needs.get-compatibility.outputs.x86_64_packages }}" >> "$GITHUB_ENV"
                fi
              ;;
              armv7l)
                # Export the armv7l container depending on whether this branch updates packages with appropriate minimum glibc.
                if [[ -n "${{ needs.get-compatibility.outputs.glibc_232_compat }}" ]]; then
                    echo "CONTAINER=satmandu/crewbuild:fievel-armv7l.m97" >> "$GITHUB_ENV"
                elif [[ -n "${{ needs.get-compatibility.outputs.glibc_237_compat }}" ]]; then
                    echo "CONTAINER=satmandu/crewbuild:strongbad-armv7l.m149" >> "$GITHUB_ENV"
                else
                    echo "CONTAINER=satmandu/crew-pre-glibc-standalone:fievel-armv7l.m91" >> "$GITHUB_ENV"
                fi
                echo "PLATFORM=linux/arm/v7" >> "$GITHUB_ENV"
                echo "LIB_SUFFIX=" >> "$GITHUB_ENV"
                if [[ -n "${{ needs.get-compatibility.outputs.armv7l_packages }}" ]]; then
                    echo "CHANGED_PACKAGES=${{ needs.get-compatibility.outputs.armv7l_packages }}" >> "$GITHUB_ENV"
                fi
              ;;
              i686)
                # There is only one i686 container based upon M58 with glibc 2.23.
                echo "CONTAINER=satmandu/crew-pre-glibc-standalone:alex-i686.m58" >> "$GITHUB_ENV"
                echo "PLATFORM=linux/386" >> "$GITHUB_ENV"
                echo "LIB_SUFFIX=" >> "$GITHUB_ENV"
                if [[ -n "${{ needs.get-compatibility.outputs.i686_packages }}" ]]; then
                    echo "CHANGED_PACKAGES=${{ needs.get-compatibility.outputs.i686_packages }}" >> "$GITHUB_ENV"
                fi
              ;;
            esac
      - name: Run unit tests
        env:
          GITHUB_EVENT: ${{ github.event_name }}
          NON_PKG_NON_WORKFLOW_CHANGED_FILES: ${{ needs.setup.outputs.non-package-non-workflow-non-manifest_files }}
        run: |
            case $GITHUB_EVENT in
              check_run | merge_group | push | workflow_run | workflow_dispatch)
                CREW_REPO="${{ github.event.repository.clone_url }}"
                export CREW_REPO
                CREW_BRANCH="${BRANCH}"
                export CREW_BRANCH
                ;;
              pull_request)
                CREW_REPO="${{ github.event.pull_request.head.repo.clone_url }}"
                export CREW_REPO
                CREW_BRANCH="${BRANCH}"
                export CREW_BRANCH
                ;;
            esac
            if [ -z "${NON_PKG_NON_WORKFLOW_CHANGED_FILES}" ] && { [ "$PLATFORM" == 'linux/arm/v7'  ] && [ -z "${{ needs.get-compatibility.outputs.armv7l_packages }}" ]; }; then
              # Exit the arm container if there are neither non-package changed files nor armv7l compatible packages.
              echo "Skipping armv7l container unit tests."
              exit 0
            elif [ -z "${NON_PKG_NON_WORKFLOW_CHANGED_FILES}" ] && { [ "$PLATFORM" == 'linux/amd64' ] && [ -z "${{ needs.get-compatibility.outputs.x86_64_packages }}" ]; }; then
              # Exit the x86_64 container if there are neither non-package changed files nor x86_64 compatible packages.
              echo "Skipping x86_64 container unit tests."
              exit 0
            elif [ -z "${NON_PKG_NON_WORKFLOW_CHANGED_FILES}" ] && { [ "$PLATFORM" == 'linux/386' ] && [ -z "${{ needs.get-compatibility.outputs.i686_packages }}" ]; }; then
              # Exit the i686 container if there are neither non-package changed files nor i686 compatible packages.
              echo "Skipping i686 container unit tests."
              exit 0
            else
              docker pull --platform "${PLATFORM}" "${CONTAINER}"
              # See https://github.com/containerd/containerd/pull/7566#issuecomment-1461134737 for why we set ulimit.
              docker run \
                --rm \
                --platform "${PLATFORM}" \
                -e CHANGED_PACKAGES="${CHANGED_PACKAGES}" \
                -e NON_PKG_NON_WORKFLOW_CHANGED_FILES="${NON_PKG_NON_WORKFLOW_CHANGED_FILES}" \
                -e GCONV_PATH="/usr/local/lib${LIB_SUFFIX}/gconv" \
                -e CREW_REPO="${CREW_REPO}" \
                -e CREW_BRANCH="${CREW_BRANCH}" \
                --tmpfs /tmp \
                --ulimit "nofile=$(ulimit -Sn):$(ulimit -Hn)" \
                "${CONTAINER}" \
                /bin/chromebrewstart /usr/local/lib/crew/tests/unit_test_stub.sh
            fi
  container_test_check:
    runs-on: ubuntu-24.04-arm
    needs:
      - container_tests
    if: ${{ !cancelled() }}
    steps:
      - name: Get GH Token
        if: github.event.pull_request.head.repo.full_name == 'chromebrew/chromebrew'
        id: get_workflow_token
        uses: peter-murray/workflow-application-token-action@v5
        with:
          application_id: ${{ secrets.APPLICATION_ID }}
          application_private_key: ${{ secrets.APPLICATION_PRIVATE_KEY }}
          organization: chromebrew
          revoke_token: true
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: true
          repository: ${{ github.event.pull_request.head.repo.full_name || github.event.repository.full_name }}
          ref: ${{ inputs.branch || github.event.workflow_run.head_branch || github.head_ref || github.ref_name }}
      - name: fail and convert to draft if container_test jobs failed
        if: ${{ contains(needs.*.result, 'failure') }}
        env:
          GH_TOKEN: ${{ steps.get_workflow_token.outputs.token || secrets.CREW_PR_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          gh pr ready --undo || true
          exit 1
